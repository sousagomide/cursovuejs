<!DOCTYPE html>
<html lang="en">

<head>
    <title>VueJS - Guia completo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <h1>Produtos</h1>
        <ul>
            <li v-for="(produto, index) in produtos">
                {{ index }}: {{ produto }}
            </li>
        </ul>
    </div>
    <script type="text/javascript">
        const app = Vue.createApp({
            data() {
                return {
                    texto: 'Produto',
                    produtos: [
                        'Monitor',
                        'Teclado',
                        'Mouse'
                    ]
                }
            }
        });
        app.mount('#app');
    </script>
</body>

</html>
