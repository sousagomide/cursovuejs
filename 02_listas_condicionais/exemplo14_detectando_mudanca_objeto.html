<!DOCTYPE html>
<html lang="en">

<head>
    <title>VueJS - Guia completo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <button @click="adicionarPropriedade">Adicionar propriedade</button>
        <button @click="substituirObjeto">Substituir objeto</button>
        <h1>Objetos:</h1>
        <ul>
            <li v-for="(valor, key) in produtos">{{key}}: {{valor}}</li>
        </ul>
    </div>
    <script type="text/javascript">
        const app = Vue.createApp({
            data() {
                return {
                    produtos: {
                        id: 2,
                        nome: 'Teclado',
                        marca: 200
                    },
                    usuario: {
                        nome: '',
                        idade: 0
                    }
                }
            },
            methods: {
                adicionarPropriedade(event) {
                    // this.usuario = { nome: 'Denecley' }
                    this.produtos.preco = 100
                },
                substituirObjeto(event) {
                    Object.assign(this.produtos, { id: 3, nome: 'Mouse', marca: 300 })
                }
            }
        });
        app.mount('#app');
    </script>
</body>

</html>
