<!DOCTYPE html>
<html lang="en">

<head>
    <title>VueJS - Guia completo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <h1>Produtos</h1>
        <ul>
            <li v-for="valor in produto">{{ valor }}</li>
        </ul>
        <ul>
            <li v-for="(valor, key) in produto">{{ key }}: {{ valor }}</li>
        </ul>
        <ul>
            <li v-for="(valor, key, index) in produto">{{ index }}.{{ key }}: {{ valor }}</li>
        </ul>
    </div>
    <script type="text/javascript">
        const app = Vue.createApp({
            data() {
                return {
                    produto: {
                        id: 1,
                        nome: 'Teclado',
                        marca: 'Dell',
                        valor: 100
                    }
                }
            }
        });
        app.mount('#app');
    </script>
</body>

</html>
