<!DOCTYPE html>
<html lang="en">

<head>
    <title>VueJS - Guia completo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <h2 ref="meuTitulo">{{titulo}}</h2>
        <button @click="alterarTitulo">Alterar título</button>
    </div>

    <script type="text/javascript">
        const app = Vue.createApp({
            data() {
                return {
                    titulo: 'Vue',
                }
            },
            methods: {
                alterarTitulo(event) {
                    this.$refs.meuTitulo.innerText = 'VueJS'
                }
            }
        }).mount('#app');

        console.log(app)

        setTimeout(() => {
            app.titulo = 'VueJS 3'
        }, 5000)
    </script>
</body>

</html>
