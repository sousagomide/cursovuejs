<!DOCTYPE html>
<html lang="en">

<head>
    <title>VueJS - Guia completo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <input :value="nome" @input="nome = $event.target.value"> <br>
        <input v-model="nome" style="margin-top: 10px;">
        <p>Nome: {{ nome }}</p>
    </div>
    <script type="text/javascript">
        const app = Vue.createApp({
            data() {
                return {
                    nome: "Denecley"
                }
            }
        }).mount('#app')
    </script>
</body>

</html>
